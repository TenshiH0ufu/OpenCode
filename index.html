<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="App de tarefas minimalista — Modern Productivity">
  <title>Minhas Tarefas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="app-header__start">
        <div>
          <h1 class="app-header__title">Tarefas</h1>
          <span class="app-header__date" id="current-date"></span>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Alternar tema">🌙</button>
      </div>
      <div class="progress-ring" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso das tarefas">
        <svg width="48" height="48" viewBox="0 0 48 48" aria-hidden="true">
          <circle cx="24" cy="24" r="20" fill="none" stroke="#e2e8f0" stroke-width="3"/>
          <circle class="progress-ring__fill" cx="24" cy="24" r="20" fill="none" stroke="#10b981" stroke-width="3"
            stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round"/>
        </svg>
        <span class="progress-ring__text">0%</span>
      </div>
    </header>

    <main class="main-content">
      <!-- Input -->
      <div class="todo-input-wrapper">
        <div class="todo-input-group">
          <input type="text" class="todo-input" id="todo-input"
            placeholder="Adicionar nova tarefa..."
            aria-label="Nova tarefa"
            autocomplete="off">
          <button class="btn-add" id="btn-add" aria-label="Adicionar tarefa">+</button>
        </div>
      </div>

      <!-- Filtros -->
      <div class="filter-bar" role="tablist" aria-label="Filtrar tarefas">
        <button class="todo-filter todo-filter--active" data-filter="all"
          role="tab" aria-selected="true" type="button">Todas</button>
        <button class="todo-filter" data-filter="active"
          role="tab" aria-selected="false" type="button">Ativas</button>
        <button class="todo-filter" data-filter="completed"
          role="tab" aria-selected="false" type="button">Completas</button>
      </div>

      <!-- Lista -->
      <ul class="todo-list" id="todo-list" role="list" aria-label="Lista de tarefas"></ul>

      <!-- Estado vazio -->
      <div class="empty-state" id="empty-state">
        <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h7"/>
        </svg>
        <p class="empty-state__text">Nenhuma tarefa encontrada</p>
      </div>

      <!-- Footer -->
      <footer class="todo-footer">
        <span class="todo-footer__count" aria-live="polite" id="task-count">0 tarefas restantes</span>
        <div class="todo-footer__actions">
          <button class="btn-ghost" id="btn-export" type="button" aria-label="Exportar tarefas">📤 Exportar</button>
          <button class="btn-ghost" id="btn-import" type="button" aria-label="Importar tarefas">📥 Importar</button>
          <input type="file" id="file-import" accept=".json" style="display:none" aria-hidden="true">
          <button class="btn-destructive" id="btn-clear" type="button">Limpar completadas</button>
        </div>
      </footer>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
